<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
}

.container {
  max-width: 420px;
  margin: 40px auto;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#6f42c1;
  color:#fff;
  border:none;
  cursor:pointer;
}

#result {
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔍 Lookup</h2>

<div class="card">
<input id="order" placeholder="Order ID">
<button onclick="search()">Search</button>
</div>

<div class="card" id="result">Enter Order ID</div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby9mL91gsJQwVv6rmQtBam4tC8DCmuAHTBth20Pb984gej2owyEASwHRmuzF3Vuu7OM/exec";

function search(){

let order=document.getElementById("order").value.trim();

if(!order){
  alert("Enter Order");
  return;
}

let box=document.getElementById("result");
box.innerHTML="Loading...";

// 🔥 IMPORTANT FIX → encodeURIComponent
fetch(API_URL + "?type=lookup&order_id=" + encodeURIComponent(order))
.then(r=>r.json())
.then(data=>{

// 🔥 ERROR HANDLE
if(data.error){
  box.innerHTML="❌ " + data.error;
  return;
}

// 🔥 EMPTY CHECK (safe)
if(!Array.isArray(data) || data.length===0){
  box.innerHTML="❌ No Data Found";
  return;
}

let html="";
let total=0;

data.forEach(i=>{
  let qty = Number(i.qty) || 0;
  total += qty;

  html += `
  <div>
    <b>SKU:</b> ${i.sku}<br>
    <b>Product:</b> ${i.product}<br>
    <b>Qty:</b> ${qty}
    <hr>
  </div>
  `;
});

html += `<b>Total Qty: ${total}</b>`;

box.innerHTML = html;

})
.catch(err=>{
  box.innerHTML="❌ Error loading data";
  console.error(err);
});

}
</script>

</body>
</html>
