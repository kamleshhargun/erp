<!DOCTYPE html>
<html>
<body class="container">

<h2>Lookup</h2>

<input id="lookupInput" placeholder="Order ID">
<button onclick="searchOrder()">Search</button>
<button onclick="clearSearch()">Clear</button>

<div id="lookupResult"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby4-vEvaelZLen4d3nixr7-Trn2LIlCUD7vlDxqFa0nq2OGLHyKadFKARFl1Fb7A40j/exec";

function searchOrder(){
let order=lookupInput.value.trim();
if(!order){alert("Enter Order");return;}

lookupResult.innerHTML="Loading...";

fetch(API_URL+"?type=lookup&order_id="+encodeURIComponent(order))
.then(r=>r.json())
.then(data=>{
lookupResult.innerHTML="";
if(!data.length){lookupResult.innerHTML="No Data";return;}

let total=0;
data.forEach(i=>{
total+=Number(i.qty)||0;
lookupResult.innerHTML+=`
<div>
Order:${i.order_id}<br>
Product:${i.product}<br>
Qty:${i.qty}
</div>`;
});

lookupResult.innerHTML+="<b>Total:"+total+"</b>";
});
}

function clearSearch(){
lookupInput.value="";
lookupResult.innerHTML="";
}
</script>

</body>
</html>
