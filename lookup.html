<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
}

.container {
  max-width: 420px;
  margin: 40px auto;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#6f42c1;
  color:#fff;
  border:none;
}

#result {
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔍 Lookup</h2>

<div class="card">
<input id="order" placeholder="Order ID">
<button onclick="search()">Search</button>
</div>

<div class="card" id="result"></div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby4-vEvaelZLen4d3nixr7-Trn2LIlCUD7vlDxqFa0nq2OGLHyKadFKARFl1Fb7A40j/exec";

function search(){
let order=document.getElementById("order").value.trim();
if(!order){alert("Enter Order");return;}

let box=result;
box.innerHTML="Loading...";

fetch(API_URL+"?type=lookup&order_id="+order)
.then(r=>r.json())
.then(data=>{

if(!data.length){
box.innerHTML="❌ No Data";
return;
}

box.innerHTML="";
let total=0;

data.forEach(i=>{
total+=Number(i.qty)||0;

box.innerHTML+=`
<div>
<b>SKU:</b> ${i.sku}<br>
<b>Product:</b> ${i.product}<br>
<b>Qty:</b> ${i.qty}
<hr>
</div>
`;
});

box.innerHTML+=`<b>Total: ${total}</b>`;
});
}
</script>

</body>
</html>
