<!DOCTYPE html>
<html>
<body>

<h3>Lookup</h3>

<input id="id">
<button onclick="search()">Search</button>

<div id="result"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby4-vEvaelZLen4d3nixr7-Trn2LIlCUD7vlDxqFa0nq2OGLHyKadFKARFl1Fb7A40j/exec";

function search(){
fetch(API_URL+"?type=lookup&order_id="+id.value)
.then(res=>res.json())
.then(d=>{
result.innerHTML=JSON.stringify(d);
});
}
</script>

</body>
</html>
