<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="container">

<h2>Finished</h2>

<button onclick="openCamera()">Scan</button>
<button onclick="openManual()">Manual</button>

<div id="scanArea" style="display:none;">
  <div id="reader" style="width:300px;"></div>

  <input id="orderId" placeholder="Order ID">
  <input id="tracking" placeholder="Tracking">

  <button onclick="sendData()">Submit</button>
  <p id="msg"></p>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby4-vEvaelZLen4d3nixr7-Trn2LIlCUD7vlDxqFa0nq2OGLHyKadFKARFl1Fb7A40j/exec";

let html5Qr;

function resetFields(){
orderId.value=""; tracking.value=""; msg.innerText="";
orderId.focus();
}

function sendData(){
fetch(API_URL,{
method:"POST",
body:JSON.stringify({
mode:"finished",
order_id:orderId.value,
tracking:tracking.value
})
})
.then(()=>{ msg.innerText="Completed ✅"; resetFields(); });
}

function openManual(){ scanArea.style.display="block"; resetFields(); }

function openCamera(){
scanArea.style.display="block";
resetFields();

html5Qr=new Html5Qrcode("reader");
html5Qr.start({facingMode:"environment"},{fps:10,qrbox:250},
(txt)=>{
if(!orderId.value){ orderId.value=txt; }
else{
tracking.value=txt;
sendData();
html5Qr.stop();
}
});
}
</script>

</body>
</html>
