<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
  margin: 0;
}

.container {
  max-width: 420px;
  margin: 20px auto;
  padding: 10px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  text-align:center;
}

.big {
  font-size:22px;
  font-weight:bold;
  color:#007bff;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">📊 Daily Stats</h2>

<div class="card">
  <h3>Pickup Today</h3>
  <div class="big" id="pickup_today">0</div>
</div>

<div class="card">
  <h3>Return Today</h3>
  <div class="big" id="return_today">0</div>
</div>

<div class="card">
  <h3>Pickup Yesterday</h3>
  <div class="big" id="pickup_yesterday">0</div>
</div>

<div class="card">
  <h3>Return Yesterday</h3>
  <div class="big" id="return_yesterday">0</div>
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwHRpW0V9Jc2uvhkBHum_AX6Asrk1U_7RyL48hdV6dP0VFj6i_eQeyqRu8ZBXu2Ub6I-g/exec";

// 🔥 FIXED FUNCTION
function loadDashboard(){

fetch(API_URL + "?type=stats")
.then(res => res.json())
.then(d => {

  // 🔥 SAFE UPDATE (IMPORTANT FIX)
  document.getElementById("pickup_today").innerText = d.todayPickup || 0;
  document.getElementById("return_today").innerText = d.todayReturn || 0;

  document.getElementById("pickup_yesterday").innerText = d.yesterdayPickup || 0;
  document.getElementById("return_yesterday").innerText = d.yesterdayReturn || 0;

})
.catch(err=>{
  console.error("Stats error:", err);
});

}

// 🔄 AUTO REFRESH
setInterval(loadDashboard, 5000);

// 🚀 FIRST LOAD
loadDashboard();

</script>

</body>
</html>
