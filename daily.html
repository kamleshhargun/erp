<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="container">

<h2>Daily Pickup & Return</h2>

<button id="pickupBtn" onclick="setMode('Pickup')" class="active">Pickup</button>
<button id="returnBtn" onclick="setMode('Return')">Return</button>

<br><br>

<button onclick="startOrder()">Scan Order</button>
<button id="nextBtn" onclick="startTracking()" style="display:none;">Scan Tracking</button>
<button onclick="openManual()">Manual</button>

<div id="reader" style="width:300px;"></div>
<p id="status"></p>

<div id="manualBox" style="display:none;">
  <input id="manualOrder" placeholder="Order ID">
  <input id="manualTracking" placeholder="Tracking">
  <button onclick="submitManual()">Submit</button>
</div>

<h3>Dashboard</h3>
Pickup Today: <span id="pickup_today">0</span><br>
Return Today: <span id="return_today">0</span>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby4-vEvaelZLen4d3nixr7-Trn2LIlCUD7vlDxqFa0nq2OGLHyKadFKARFl1Fb7A40j/exec";

let html5QrCode, orderId="", mode="Pickup";

const beep=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

function setMode(m){
mode=m;
pickupBtn.classList.remove("active");
returnBtn.classList.remove("active");
if(m==="Pickup") pickupBtn.classList.add("active");
else returnBtn.classList.add("active");
}

function startOrder(){
html5QrCode=new Html5Qrcode("reader");
html5QrCode.start({facingMode:"environment"},{fps:25,qrbox:{width:250,height:120}},
text=>{
orderId=text;
stopScan();
status.innerText="Order Scanned ✅";
nextBtn.style.display="inline-block";
});
}

function startTracking(){
html5QrCode=new Html5Qrcode("reader");
html5QrCode.start({facingMode:"environment"},{fps:25,qrbox:{width:250,height:120}},
text=>{
stopScan();
beep.play();
sendData(orderId,text);
status.innerText="Done ✅";
nextBtn.style.display="none";
orderId="";
});
}

function stopScan(){
if(html5QrCode) html5QrCode.stop().catch(()=>{});
}

function openManual(){ manualBox.style.display="block"; }

function submitManual(){
let o=manualOrder.value.trim();
let t=manualTracking.value.trim();
if(!o||!t){alert("Fill both");return;}
beep.play();
sendData(o,t);
manualOrder.value="";
manualTracking.value="";
manualBox.style.display="none";
}

function sendData(o,t){
fetch(API_URL,{method:"POST",body:JSON.stringify({
mode:mode.toLowerCase(),order_id:o,tracking:t
})}).then(loadDashboard);
}

function loadDashboard(){
fetch(API_URL+"?type=stats")
.then(r=>r.json())
.then(d=>{
pickup_today.innerText=d.todayPickup||0;
return_today.innerText=d.todayReturn||0;
});
}

setInterval(loadDashboard,3000);
loadDashboard();
</script>

</body>
</html>
