<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- QR LIB LOCKED -->
<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
body{
  font-family:'Segoe UI', Arial;
  background:linear-gradient(135deg,#eef2f7,#dfe9f3);
  margin:0;
  text-align:center;
  transition:0.2s;
}

.container{
  max-width:420px;
  margin:auto;
  padding:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:600;
}

.start{background:#28a745;color:#fff;}
.stop{background:#dc3545;color:#fff;}
.manual{background:#444;color:#fff;}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* DASHBOARD */
.stat{
  display:flex;
  justify-content:space-between;
}
.stat div{
  flex:1;
  background:#f8f9fa;
  margin:3px;
  padding:8px;
  border-radius:8px;
}
.stat span{
  font-weight:bold;
  color:#007bff;
}

/* TOGGLE */
.toggle-group{
  display:flex;
  gap:10px;
  margin:15px 0;
}
.toggle-btn{
  flex:1;
  padding:12px;
  background:#e0e0e0;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
.toggle-btn.active{
  background:#007bff;
  color:#fff;
  border-radius:50px;
}

/* SCANNER FIX */
#reader{ position:relative; }
#reader video{ width:100%; pointer-events:none; }

/* FLASH */
body.flash-success{ background:#d4edda !important; }
body.flash-error{ background:#f8d7da !important; }

#manualBox{ display:none; }
</style>
</head>

<body>

<div class="container">

<h2>📦 Pickup / Return System</h2>

<!-- DASHBOARD -->
<div class="card">
<h3>📊 Dashboard</h3>
<div class="stat">
<div>Pickup <span id="pickup_today">0</span></div>
<div>Return <span id="return_today">0</span></div>
</div>
</div>

<!-- MODE -->
<div class="toggle-group">
  <div id="pickupBtn" class="toggle-btn active" onclick="selectMode('pickup')">Pickup</div>
  <div id="returnBtn" class="toggle-btn" onclick="selectMode('return')">Return</div>
</div>

<!-- SCANNER -->
<div class="card">
<div id="reader"></div>

<button class="start" onclick="startScan()">Start</button>
<button class="stop" onclick="stopScan()">Stop</button>
<button class="manual" onclick="openManual()">Manual</button>

<div id="status">Ready...</div>
</div>

<!-- MANUAL -->
<div class="card" id="manualBox">
<input id="manualOrder" placeholder="Order ID">
<input id="manualTracking" placeholder="Tracking ID">
<button onclick="submitManual()">Submit</button>
</div>

</div>

<script src="config.js"></script>

<script>
// ===== GLOBAL =====
let html5QrCode;
let step="order";
let orderId="";
let mode="pickup";

const beep=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// ===== MODE =====
function selectMode(type){
  mode = type;

  pickupBtn.classList.remove("active");
  returnBtn.classList.remove("active");

  type==="pickup" ? pickupBtn.classList.add("active") : returnBtn.classList.add("active");

  openManual();
  setTimeout(()=>manualOrder.focus(),100);
}

// ===== SCAN =====
function startScan(){

  if(!html5QrCode){
    html5QrCode = new Html5Qrcode("reader");
  }

  html5QrCode.start(
    { facingMode:"environment" },
    { fps:15, qrbox:250 },
    text=>{

      if(step==="order"){
        orderId=text;
        manualOrder.value=text;
        manualTracking.focus();
        step="tracking";
        return;
      }

      if(step==="tracking"){
        manualTracking.value=text;
        stopScan();
        submitManual();
      }

    }
  );
}

// ===== STOP =====
function stopScan(){
  if(html5QrCode){
    html5QrCode.stop().catch(()=>{});
  }
}

// ===== MANUAL =====
function openManual(){
  manualBox.style.display="block";
}

function submitManual(){

  let o=manualOrder.value.trim();
  let t=manualTracking.value.trim();

  if(!o||!t){
    alert("Fill both");
    return;
  }

  beep.play();

  sendData(o,t);

  resetFlow();

  setTimeout(()=>manualOrder.focus(),200);
}

// ===== RESET =====
function resetFlow(){
  step="order";
  orderId="";
  manualOrder.value="";
  manualTracking.value="";
  status.innerText="Ready...";
}

// ===== FLASH =====
function flash(type){

  document.body.classList.add(type==="success"?"flash-success":"flash-error");

  setTimeout(()=>{
    document.body.classList.remove("flash-success","flash-error");
  },300);

  if(navigator.vibrate){
    navigator.vibrate(type==="success"?100:[200,100,200]);
  }
}

// ===== SEND =====
function sendData(o,t){

  fetch(API.post,{
    method:"POST",
    body:JSON.stringify({
      mode:mode,
      order_id:o,
      tracking:t
    })
  })
  .then(r=>r.json())
  .then(res=>{

    if(res.duplicate){
      status.innerText="Duplicate ⚠️";
      flash("error");
      return;
    }

    status.innerText="Saved ✅";
    flash("success");

    loadDashboard();
  });
}

// ===== COUNT ANIMATION =====
function animateValue(el, start, end, duration){
  let startTime=null;

  function step(timestamp){
    if(!startTime) startTime=timestamp;
    let progress=Math.min((timestamp-startTime)/duration,1);
    el.innerText=Math.floor(progress*(end-start)+start);
    if(progress<1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

// ===== DASHBOARD =====
function loadDashboard(){
  fetch(API.stats)
  .then(r=>r.json())
  .then(d=>{

    animateValue(pickup_today, Number(pickup_today.innerText)||0, d.todayPickup||0, 300);
    animateValue(return_today, Number(return_today.innerText)||0, d.todayReturn||0, 300);

  });
}

// INIT
loadDashboard();
setInterval(loadDashboard,4000);

</script>

</body>
</html>
