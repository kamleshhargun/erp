<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #eef2f7, #dfe9f3);
  margin: 0;
}

.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 15px;
}

h2 {
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}

.card {
  flex: 1;
  min-width: 200px;
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.big {
  font-size: 22px;
  font-weight: bold;
  color: #007bff;
}

.section-title {
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🏠 Home</h2>

<div class="section-title">Daily</div>
<div class="cards">
  <div class="card">
    <h3>Pickup Today</h3>
    <div class="big" id="pickup_today">0</div>
  </div>

  <div class="card">
    <h3>Return Today</h3>
    <div class="big" id="return_today">0</div>
  </div>

  <div class="card">
    <h3>Total Pickup</h3>
    <div class="big" id="pickup_total">0</div>
  </div>

  <div class="card">
    <h3>Total Return</h3>
    <div class="big" id="return_total">0</div>
  </div>
</div>

<div class="section-title">Quick Access</div>
<div class="cards">
  <div class="card" onclick="go('daily.html')">Daily</div>
  <div class="card" onclick="go('lookup.html')">Lookup</div>
  <div class="card" onclick="go('tracking.html')">Tracking</div>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby4-vEvaelZLen4d3nixr7-Trn2LIlCUD7vlDxqFa0nq2OGLHyKadFKARFl1Fb7A40j/exec";

function go(page){
  window.location.href = page;
}

function loadDashboard(){
fetch(API_URL+"?type=stats")
.then(res=>res.json())
.then(d=>{
pickup_today.innerText = d.todayPickup || 0;
return_today.innerText = d.todayReturn || 0;
pickup_total.innerText = d.totalPickup || 0;
return_total.innerText = d.totalReturn || 0;
});
}

setInterval(loadDashboard,3000);
loadDashboard();
</script>

</body>
</html>
