<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HARSIDHI VENTURES</title>

<script src="config.js"></script>

<style>
body{
  font-family: system-ui, -apple-system, Arial;
  background:#e9ecef;
  margin:0;
}

/* ===== APP CONTAINER ===== */
.app{
  max-width:420px;
  margin:auto;
  background:#fff;
  min-height:100vh;
}

/* DESKTOP CENTER LOOK */
@media (min-width:768px){
  .app{
    max-width:420px;
    margin-top:20px;
    margin-bottom:20px;
    border-radius:16px;
    box-shadow:0 5px 25px rgba(0,0,0,0.1);
  }
}

/* ===== HEADER ===== */
header{
  padding:16px;
  text-align:center;
  font-weight:600;
  font-size:16px;
  border-bottom:1px solid #eee;
  background:#fff;
}

/* ===== NAV ===== */
.nav{
  display:flex;
  border-bottom:1px solid #eee;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
}

.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:#fff;
  color:#555;
  font-size:14px;
  font-weight:500;
}

.nav button.active{
  color:#1a73e8;
  border-bottom:2px solid #1a73e8;
}

/* ===== SECTIONS ===== */
.section{
  display:none;
  padding:14px;
}

.activeSection{
  display:block;
}

/* ===== CARD ===== */
.card{
  background:#fff;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
}

/* ===== INPUT ===== */
input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  outline:none;
}

input:focus, select:focus{
  border-color:#1a73e8;
  box-shadow:0 0 0 2px rgba(26,115,232,0.1);
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:#1a73e8;
  color:#fff;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

/* ===== STATS ===== */
.stats{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.stats div{
  flex:1;
  background:#f8f9fa;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:13px;
}

.big{
  font-size:18px;
  font-weight:600;
  margin-top:4px;
}

/* ===== RESULT BOX ===== */
#lookupResult div,
#trackResult{
  background:#f8f9fa;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

/* ===== STATUS TEXT ===== */
#status{
  margin-top:10px;
  font-size:14px;
  font-weight:500;
}

/* hidden manual button */
#manualBtn{
  display:none;
}
</style>

</head>
<body>

<div class="app">

<header>HARSIDHI VENTURES</header>

<!-- ===== STATS ===== -->
<div class="card">
  <h3>Daily Stats</h3>

  <div class="stats">
    <div>Today Pickup<br><span id="todayPickup" class="big">0</span></div>
    <div>Today Return<br><span id="todayReturn" class="big">0</span></div>
  </div>

  <div class="stats">
    <div>Yesterday Pickup<br><span id="yestPickup" class="big">0</span></div>
    <div>Yesterday Return<br><span id="yestReturn" class="big">0</span></div>
  </div>

  <div class="stats">
    <div>Total Pickup<br><span id="totalPickup" class="big">0</span></div>
    <div>Total Return<br><span id="totalReturn" class="big">0</span></div>
  </div>
</div>

<!-- ===== NAV ===== -->
<div class="nav">
  <button class="tab active" onclick="showSection('scan', this)">Scan</button>
  <button class="tab" onclick="showSection('lookup', this)">Lookup</button>
  <button class="tab" onclick="showSection('tracking', this)">Tracking</button>
</div>

<!-- ================= SCAN ================= -->
<div id="scan" class="section activeSection">

<div class="card">
<h3>Scan Pickup / Return</h3>

<select id="mode">
  <option value="pickup">Pickup</option>
  <option value="return">Return</option>
</select>

<input id="orderId" placeholder="Scan Order ID" autocomplete="off">
<input id="trackingId" placeholder="Scan Tracking ID" autocomplete="off">

<button id="manualBtn" onclick="submitScan()">Submit</button>

<div id="status"></div>
</div>

</div>

<!-- ================= LOOKUP ================= -->
<div id="lookup" class="section">

<div class="card">
<h3>Order Lookup</h3>

<input id="searchOrder" placeholder="Order ID">
<button onclick="lookup()">Search</button>

<div id="lookupResult"></div>
</div>

</div>

<!-- ================= TRACK ================= -->
<div id="tracking" class="section">

<div class="card">
<h3>Order Tracking</h3>

<input id="trackOrder" placeholder="Order ID">
<input id="trackWaybill" placeholder="Tracking ID">

<button onclick="track()">Track</button>

<div id="trackResult"></div>
</div>

</div>

</div>

<script>

// 🔊 Beep sound
const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// ===== SAFE ELEMENT GET =====
const orderId = document.getElementById("orderId");
const trackingId = document.getElementById("trackingId");
const mode = document.getElementById("mode");
const status = document.getElementById("status");

const searchOrder = document.getElementById("searchOrder");
const lookupResult = document.getElementById("lookupResult");

const trackOrder = document.getElementById("trackOrder");
const trackWaybill = document.getElementById("trackWaybill");
const trackResult = document.getElementById("trackResult");

// ================= NAV =================
function showSection(id, el){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("activeSection"));
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));

  document.getElementById(id).classList.add("activeSection");
  if(el) el.classList.add("active");
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {

  console.log("Page Loaded ✅");

  loadStats();

  document.getElementById("orderId").focus();

});

// ================= STATS =================
async function loadStats(){
  try{

    const res = await fetch(API.stats() + "&_=" + Date.now());
    const data = await res.json();

    console.log("Stats Data:", data);

    document.getElementById("todayPickup").innerText = data.todayPickup || 0;
    document.getElementById("todayReturn").innerText = data.todayReturn || 0;
    document.getElementById("yestPickup").innerText = data.yesterdayPickup || 0;
    document.getElementById("yestReturn").innerText = data.yesterdayReturn || 0;
    document.getElementById("totalPickup").innerText = data.totalPickup || 0;
    document.getElementById("totalReturn").innerText = data.totalReturn || 0;

  }catch(e){
    console.log("Stats Error:", e);
  }
}
// 🔥 SAFE SET FUNCTION
function setValue(id, value){
  const el = document.getElementById(id);
  if(el){
    el.innerText = value || 0;
  }else{
    console.log("Missing ID:", id);
  }
}

// ================= PAGE LOAD =================
document.addEventListener("DOMContentLoaded", function(){

  console.log("DOM Ready ✅");

  loadStats();

  const order = document.getElementById("orderId");
  if(order) order.focus();

});


// ================= SCANNER FLOW =================

// mode change → वापस order पे
mode.addEventListener("change", resetFlow);

// order scan → tracking
orderId.addEventListener("change", ()=>{
  if(orderId.value.trim()){
    trackingId.focus();
  }
});

// tracking scan → auto submit
trackingId.addEventListener("change", ()=>{
  if(trackingId.value.trim()){
    submitScan();
  }
});

// ================= SUBMIT =================
async function submitScan(){

  let order = orderId.value.trim();
  let tracking = trackingId.value.trim();
  let m = mode.value;

  if(!order || !tracking) return;

  status.innerText = "Saving...";

  try{

    let res = await fetch(API.post,{
      method:"POST",
      body:JSON.stringify({
        mode:m,
        order_id:order,
        tracking:tracking
      })
    });

    let data = await res.json();

    if(data.status==="success"){
      beep.play();
      status.innerText="Saved ✅";

      loadStats(); // 🔥 update stats

      resetFlow();
    }else{
      status.innerText="Error ❌";
    }

  }catch(e){
    status.innerText="Network Error";
  }
}

// ================= RESET =================
function resetFlow(){
  orderId.value="";
  trackingId.value="";
  setTimeout(()=>orderId.focus(),100);
}

// ================= LOOKUP =================
async function lookup(){
  try{
    let res = await fetch(API.lookup(searchOrder.value));
    let data = await res.json();

    let html="";
    data.forEach(d=>{
      html += `<div>${d.order_id} | ${d.sku} | ₹${d.amount}</div>`;
    });

    lookupResult.innerHTML = html || "No Data";

  }catch(e){
    lookupResult.innerText = "Error";
  }
}

// ================= TRACK =================
async function track(){
  try{
    let res = await fetch(API.track(trackOrder.value,trackWaybill.value));
    let d = await res.json();

    if(d.error){
      trackResult.innerText = d.error;
      return;
    }

    trackResult.innerHTML = `
      <b>Status:</b> ${d.status}<br>
      <b>Location:</b> ${d.location}<br>
      <b>Customer:</b> ${d.customer}
    `;

  }catch(e){
    trackResult.innerText = "Error";
  }
}

</script>

</body>
</html>
