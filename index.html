<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HARSIDHI VENTURES</title>

<script src="config.js"></script>

<style>
body{
  font-family: Arial;
  background:#f4f4f4;
  margin:0;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* NAV BUTTONS */
.nav{
  display:flex;
  background:#222;
}

.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:#222;
  color:#fff;
  cursor:pointer;
}

.nav button.active{
  background:#000;
}

/* SECTIONS */
.section{
  display:none;
  padding:15px;
}

.activeSection{
  display:block;
}

.card{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#000;
  color:#fff;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.stats div{
  flex:1;
  text-align:center;
}

.big{
  font-size:20px;
  font-weight:bold;
}
</style>

</head>
<body>

<header>HARSIDHI VENTURES</header>

<!-- ================= NAV ================= -->
<div class="nav">
  <button class="tab active" onclick="showSection('scan')">Daily Scan</button>
  <button class="tab" onclick="showSection('lookup')">Lookup</button>
  <button class="tab" onclick="showSection('tracking')">Tracking</button>
</div>

<!-- ================= DAILY SCAN ================= -->
<div id="scan" class="section activeSection">

<div class="card">
<h2>Daily Stats</h2>

<div class="stats">
  <div>Today Pickup<br><span id="todayPickup" class="big">0</span></div>
  <div>Today Return<br><span id="todayReturn" class="big">0</span></div>
</div>

<div class="stats">
  <div>Yesterday Pickup<br><span id="yestPickup" class="big">0</span></div>
  <div>Yesterday Return<br><span id="yestReturn" class="big">0</span></div>
</div>

<div class="stats">
  <div>Total Pickup<br><span id="totalPickup" class="big">0</span></div>
  <div>Total Return<br><span id="totalReturn" class="big">0</span></div>
</div>

</div>

<div class="card">
<h2>Scan Pickup / Return</h2>

<select id="mode">
  <option value="pickup">Pickup</option>
  <option value="return">Return</option>
</select>

<input id="orderId" placeholder="Scan / Enter Order ID">
<input id="trackingId" placeholder="Scan Tracking ID">

<button onclick="saveScan()">Submit</button>

<div id="scanStatus"></div>
</div>

</div>

<!-- ================= LOOKUP ================= -->
<div id="lookup" class="section">

<div class="card">
<h2>Order Lookup</h2>

<input id="searchOrder" placeholder="Enter Order ID">
<button onclick="lookup()">Search</button>

<div id="lookupResult"></div>
</div>

</div>

<!-- ================= TRACKING ================= -->
<div id="tracking" class="section">

<div class="card">
<h2>Order Tracking</h2>

<input id="trackOrder" placeholder="Order ID">
<input id="trackWaybill" placeholder="Tracking ID">

<button onclick="track()">Track</button>

<div id="trackResult"></div>
</div>

</div>

<script>

// ================= NAV SWITCH =================
function showSection(id){

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("activeSection");
  });

  document.querySelectorAll(".tab").forEach(b=>{
    b.classList.remove("active");
  });

  document.getElementById(id).classList.add("activeSection");
  event.target.classList.add("active");
}

// ================= LOAD STATS =================
async function loadStats(){
  let res = await fetch(API.stats);
  let d = await res.json();

  document.getElementById("todayPickup").innerText = d.todayPickup;
  document.getElementById("todayReturn").innerText = d.todayReturn;
  document.getElementById("yestPickup").innerText = d.yesterdayPickup;
  document.getElementById("yestReturn").innerText = d.yesterdayReturn;
  document.getElementById("totalPickup").innerText = d.totalPickup;
  document.getElementById("totalReturn").innerText = d.totalReturn;
}

loadStats();

// ================= SAVE SCAN =================
async function saveScan(){

  let order = orderId.value.trim();
  let tracking = trackingId.value.trim();
  let mode = mode.value;

  if(!order || !tracking){
    alert("Enter both values");
    return;
  }

  let res = await fetch(API.post,{
    method:"POST",
    body:JSON.stringify({
      mode:mode,
      order_id:order,
      tracking:tracking
    })
  });

  let data = await res.json();

  if(data.status==="success"){
    scanStatus.innerText="Saved ✅";
    orderId.value="";
    trackingId.value="";
    orderId.focus();
    loadStats();
  }
}

// AUTO FLOW
orderId.focus();

orderId.addEventListener("change",()=>{
  trackingId.focus();
});

trackingId.addEventListener("change",()=>{
  saveScan();
});

// ================= LOOKUP =================
async function lookup(){

  let order = searchOrder.value;

  let res = await fetch(API.lookup(order));
  let data = await res.json();

  let html="";

  data.forEach(d=>{
    html += `
      <div>
        <b>${d.order_id}</b><br>
        SKU: ${d.sku}<br>
        Qty: ${d.qty}<br>
        ₹${d.amount}<br><br>
      </div>
    `;
  });

  lookupResult.innerHTML = html || "No Data";
}

// ================= TRACK =================
async function track(){

  let order = trackOrder.value;
  let waybill = trackWaybill.value;

  let res = await fetch(API.track(order,waybill));
  let d = await res.json();

  if(d.error){
    trackResult.innerText=d.error;
    return;
  }

  trackResult.innerHTML = `
    <b>Status:</b> ${d.status}<br>
    <b>Location:</b> ${d.location}<br>
    <b>Customer:</b> ${d.customer}<br>
    <b>State:</b> ${d.state}<br>
    <b>Payment:</b> ${d.payment}<br>
    <b>Amount:</b> ₹${d.amount}
  `;
}

</script>

</body>
</html>
