<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HARSIDHI VENTURES</title>

<script src="config.js"></script>

<style>
body{
  font-family: Arial;
  background:#f4f4f4;
  margin:0;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container{
  padding:15px;
}

.card{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

h2{margin-top:0;}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#000;
  color:#fff;
  cursor:pointer;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.stats div{
  flex:1;
  text-align:center;
}

.big{
  font-size:20px;
  font-weight:bold;
}
</style>

</head>
<body>

<header>NX SKIN ERP</header>

<div class="container">

<!-- ================= STATS ================= -->
<div class="card">
<h2>Daily Stats</h2>

<div class="stats">
  <div>Today Pickup<br><span class="big" id="todayPickup">0</span></div>
  <div>Today Return<br><span class="big" id="todayReturn">0</span></div>
</div>

<div class="stats">
  <div>Yesterday Pickup<br><span class="big" id="yestPickup">0</span></div>
  <div>Yesterday Return<br><span class="big" id="yestReturn">0</span></div>
</div>

<div class="stats">
  <div>Total Pickup<br><span class="big" id="totalPickup">0</span></div>
  <div>Total Return<br><span class="big" id="totalReturn">0</span></div>
</div>

</div>

<!-- ================= SCANNER ================= -->
<div class="card">
<h2>Pickup / Return Scan</h2>

<select id="mode">
  <option value="pickup">Pickup</option>
  <option value="return">Return</option>
</select>

<input id="orderId" placeholder="Scan / Enter Order ID">
<input id="trackingId" placeholder="Scan Tracking ID">

<button onclick="saveScan()">Submit</button>

<div id="scanStatus"></div>
</div>

<!-- ================= LOOKUP ================= -->
<div class="card">
<h2>Order Lookup</h2>

<input id="searchOrder" placeholder="Enter Order ID">
<button onclick="lookup()">Search</button>

<div id="lookupResult"></div>
</div>

<!-- ================= TRACKING ================= -->
<div class="card">
<h2>Order Tracking</h2>

<input id="trackOrder" placeholder="Order ID">
<input id="trackWaybill" placeholder="Tracking ID">

<button onclick="track()">Track</button>

<div id="trackResult"></div>
</div>

</div>

<script>

// ================= LOAD STATS =================
async function loadStats(){
  let res = await fetch(API.stats);
  let d = await res.json();

  document.getElementById("todayPickup").innerText = d.todayPickup;
  document.getElementById("todayReturn").innerText = d.todayReturn;
  document.getElementById("yestPickup").innerText = d.yesterdayPickup;
  document.getElementById("yestReturn").innerText = d.yesterdayReturn;
  document.getElementById("totalPickup").innerText = d.totalPickup;
  document.getElementById("totalReturn").innerText = d.totalReturn;
}

loadStats();

// ================= SCAN SAVE =================
async function saveScan(){

  let order = document.getElementById("orderId").value.trim();
  let tracking = document.getElementById("trackingId").value.trim();
  let mode = document.getElementById("mode").value;

  if(!order || !tracking){
    alert("Scan both Order & Tracking");
    return;
  }

  let res = await fetch(API.post,{
    method:"POST",
    body:JSON.stringify({
      mode:mode,
      order_id:order,
      tracking:tracking
    })
  });

  let data = await res.json();

  if(data.status==="success"){
    document.getElementById("scanStatus").innerText="Saved ✅";
    document.getElementById("orderId").value="";
    document.getElementById("trackingId").value="";
    document.getElementById("orderId").focus();
    loadStats();
  }else{
    alert("Error");
  }
}

// AUTO FLOW
document.getElementById("orderId").focus();

document.getElementById("orderId").addEventListener("change",()=>{
  document.getElementById("trackingId").focus();
});

document.getElementById("trackingId").addEventListener("change",()=>{
  saveScan();
});

// ================= LOOKUP =================
async function lookup(){

  let order = document.getElementById("searchOrder").value;

  let res = await fetch(API.lookup(order));
  let data = await res.json();

  let html="";

  data.forEach(d=>{
    html += `
      <div>
        <b>${d.order_id}</b><br>
        SKU: ${d.sku}<br>
        Qty: ${d.qty}<br>
        ₹${d.amount}<br><br>
      </div>
    `;
  });

  document.getElementById("lookupResult").innerHTML = html || "No Data";
}

// ================= TRACK =================
async function track(){

  let order = document.getElementById("trackOrder").value;
  let waybill = document.getElementById("trackWaybill").value;

  let res = await fetch(API.track(order,waybill));
  let d = await res.json();

  if(d.error){
    document.getElementById("trackResult").innerText=d.error;
    return;
  }

  document.getElementById("trackResult").innerHTML = `
    <b>Status:</b> ${d.status}<br>
    <b>Location:</b> ${d.location}<br>
    <b>Customer:</b> ${d.customer}<br>
    <b>State:</b> ${d.state}<br>
    <b>Payment:</b> ${d.payment}<br>
    <b>Amount:</b> ₹${d.amount}
  `;
}

</script>

</body>
</html>
