<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family:Segoe UI; text-align:center; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<h3>Scanner</h3>

<div id="reader"></div>

<button onclick="startOrder()">Start</button>
<button onclick="startTracking()">Next</button>
<button onclick="stopScan()">Stop</button>

<div id="status">Ready</div>

<script>
const API_URL="YOUR_API_URL";

let html5QrCode;
let orderId="";

function startOrder(){
html5QrCode=new Html5Qrcode("reader");
html5QrCode.start({facingMode:"environment"},{fps:25},
text=>{
orderId=text;
stopScan();
status.innerText="Order Scanned";
});
}

function startTracking(){
html5QrCode=new Html5Qrcode("reader");
html5QrCode.start({facingMode:"environment"},{fps:25},
text=>{
stopScan();
sendData(orderId,text);
status.innerText="Done";
});
}

function stopScan(){
if(html5QrCode) html5QrCode.stop();
}

function sendData(order,tracking){
fetch(API_URL,{
method:"POST",
body:JSON.stringify({order_id:order,tracking:tracking})
});
}
</script>

</body>
</html>
