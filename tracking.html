<!DOCTYPE html>
<html>
<body class="container">

<h2>Tracking</h2>

<input id="trackOrderId" placeholder="Order ID">
<input id="trackWaybill" placeholder="Tracking">
<button onclick="trackOrder()">Track</button>

<div id="trackResult"></div>

<br>
<div id="settleBox" style="display:none;">
<input id="settleAmount" placeholder="Amount">
<input id="settleDate" type="date">
<button id="saveBtn" onclick="saveTracking()">Save</button>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby4-vEvaelZLen4d3nixr7-Trn2LIlCUD7vlDxqFa0nq2OGLHyKadFKARFl1Fb7A40j/exec";

let trackingData=null;

function trackOrder(){
let o=trackOrderId.value.trim();
let t=trackWaybill.value.trim();

if(!o||!t){alert("Enter both");return;}

trackResult.innerHTML="Loading...";

fetch(API_URL+"?type=track&order_id="+encodeURIComponent(o)+"&tracking="+encodeURIComponent(t))
.then(r=>r.json())
.then(d=>{
if(d.error){trackResult.innerHTML=d.error;return;}

trackingData=d;

trackResult.innerHTML=`
Status:${d.status}<br>
Location:${d.location}<br>
Customer:${d.customer}<br>
Amount:${d.amount}`;

settleBox.style.display="block";
settleAmount.value=d.amount;
});
}

function saveTracking(){
fetch(API_URL,{
method:"POST",
body:JSON.stringify({
type:"saveTracking",
...trackingData,
settled_amount:settleAmount.value,
settled_date:settleDate.value
})
}).then(()=>alert("Saved ✅"));
}
</script>

</body>
</html>
