<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
}

.container {
  max-width: 420px;
  margin: 40px auto;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
}

.search { background:#6f42c1; color:#fff; }
.start { background:#28a745; color:#fff; }

#trackResult {
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Tracking</h2>

<div class="card">
<input id="order" placeholder="Order ID">
<input id="tracking" placeholder="Tracking">
<button class="search" onclick="track()">Track</button>
</div>

<div class="card" id="trackResult">Enter details</div>

<div class="card" id="extraBox" style="display:none;">
<label>Settled Amount</label>
<input id="settledAmount" readonly>

<label>Select Date</label>
<input type="date" id="settledDate">
</div>

<button class="start" id="saveBtn" onclick="save()" style="display:none;">Save</button>

</div>
<script src="config.js"></script>
<script>
let data=null;

function track(){
let o=order.value.trim();
let t=tracking.value.trim();

if(!o||!t){alert("Enter both");return;}

trackResult.innerHTML="Loading...";

fetch(API_URL+`?type=track&order_id=${o}&tracking=${t}`)
.then(r=>r.json())
.then(d=>{

if(d.error){
trackResult.innerHTML="❌ "+d.error;
return;
}

data=d;

// 🔥 PAYMENT LOGIC
let amount = Number(d.amount || 0);
let settled = amount;

if(d.payment === "Prepaid"){
  settled = amount - (amount * 0.025 * 1.18);
}

// UI update
trackResult.innerHTML=`
<b>Status:</b> ${d.status}<br>
<b>Location:</b> ${d.location}<br>
<b>Customer:</b> ${d.customer}<br>
<b>Payment:</b> ${d.payment}<br>
<b>Amount:</b> ₹${amount}
`;

settledAmount.value = settled.toFixed(2);

// default date = today
let today = new Date().toISOString().split('T')[0];
settledDate.value = today;

extraBox.style.display="block";
saveBtn.style.display="block";
});
}

function save(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
type:"saveTracking",
...data,
settled_amount: settledAmount.value,
settled_date: settledDate.value
})
})
.then(r=>r.json())
.then(res=>{
if(res.duplicate){
alert("⚠️ Duplicate Entry Not Saved");
}else{
alert("Saved ✅");
}
saveBtn.style.display="none";
});
}
</script>

</body>
</html>
