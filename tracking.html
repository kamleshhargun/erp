<!DOCTYPE html>
<html>
<body>
<header id="header">
    <h2>Dashboard</h2>
</header>

<div class="navbar" id="navbar">
    <button class="active" onclick="goPage('dashboard.html', this)">Dashboard</button>
    <button onclick="goPage('daily.html', this)">Daily</button>
    <button onclick="goPage('lookup.html', this)">Lookup</button>
    <button onclick="goPage('tracking.html', this)">Tracking</button>
</div>
<h3>Tracking</h3>

<input id="order">
<input id="track">

<button onclick="trackOrder()">Track</button>

<div id="result"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby4-vEvaelZLen4d3nixr7-Trn2LIlCUD7vlDxqFa0nq2OGLHyKadFKARFl1Fb7A40j/exec";

function trackOrder(){
fetch(API_URL+"?type=track&order_id="+order.value+"&tracking="+track.value)
.then(res=>res.json())
.then(d=>{
result.innerHTML=JSON.stringify(d);
});
}
</script>

</body>
</html>
