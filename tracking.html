<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
}

.container {
  max-width: 420px;
  margin: 40px auto;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
}

.search { background:#6f42c1; color:#fff; }
.start { background:#28a745; color:#fff; }

#trackResult {
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Tracking</h2>
<button onclick="refreshPage()" style="
position:fixed;
top:10px;
right:10px;
padding:8px 12px;
background:#007bff;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
z-index:999;
">
🔄 Refresh
</button>
<div class="card">
<input id="order" placeholder="Order ID">
<input id="tracking" placeholder="Tracking">
<button class="search" onclick="track()">Track</button>
</div>

<div class="card" id="trackResult">Enter details</div>

<div class="card" id="extraBox" style="display:none;">
<label>Settled Amount</label>
<input id="settledAmount" readonly>

<label>Select Date</label>
<input type="date" id="settledDate">
</div>

<button class="start" id="saveBtn" onclick="save()" style="display:none;">Save</button>

</div>
<script src="config.js"></script>
<script>
let data=null;

function track(){
let o=order.value.trim();
let t=tracking.value.trim();

if(!o||!t){alert("Enter both");return;}

trackResult.innerHTML="Loading...";

fetch(API.track(o,t))
.then(r=>r.json())
.then(d=>{

if(d.error){
trackResult.innerHTML="❌ "+d.error;
return;
}

data=d;

// 🔥 PAYMENT LOGIC
let amount = Number(d.amount || 0);
let settled = amount;

if(d.payment === "Prepaid"){
  settled = amount - (amount * 0.025 * 1.18);
}

// UI update
trackResult.innerHTML=`
<b>Status:</b> ${d.status}<br>
<b>Location:</b> ${d.location}<br>
<b>Customer:</b> ${d.customer}<br>
<b>Payment:</b> ${d.payment}<br>
<b>Amount:</b> ₹${amount}
`;

settledAmount.value = settled.toFixed(2);

// default date = today
let today = new Date().toISOString().split('T')[0];
settledDate.value = today;

extraBox.style.display="block";
saveBtn.style.display="block";
});
}

function saveTracking(){

  fetch(API.post,{
    method:"POST",
    body:JSON.stringify({
      type:"saveTracking",
      ...trackingData
    })
  })
  .then(()=>{
    alert("Saved ✅");

    // 🔥 RESET ALL FIELDS
    trackOrderId.value = "";
    trackWaybill.value = "";
    trackResult.innerHTML = "";
    saveBtn.style.display = "none";

    trackingData = null;
  });
}
  // HTML REFRESH
  function refreshPage(){

  // ✅ Return Request Page
  if (typeof loadData === "function") {
    loadData();
    console.log("Return data refreshed");
  }

  // ✅ Scanner Dashboard
  if (typeof loadDashboard === "function") {
    loadDashboard();
    console.log("Dashboard refreshed");
  }

  // ✅ Tracking Page
  if (typeof trackOrder === "function" && trackingData) {
    trackOrder();
    console.log("Tracking refreshed");
  }

  // ✅ Extra safety (agar kuch bhi na mile)
  if (
    typeof loadData !== "function" &&
    typeof loadDashboard !== "function"
  ){
    console.log("Fallback reload");
    location.reload(); // last option
  }
}
  async function trackOrder(){

  let o = trackOrderId.value.trim();
  let t = trackWaybill.value.trim();

  if(!o || !t){
    alert("Enter Order & Waybill");
    return;
  }

  // 🔥 1. GET TRACKING (Delhivery)
  let trackRes = await fetch(API.track(o,t));
  let trackData = await trackRes.json();

  if(trackData.error){
    trackResult.innerHTML = "❌ " + trackData.error;
    return;
  }

  // 🔥 2. GET LOOKUP DATA (Sheet2)
  let lookupRes = await fetch(API.lookup(o));
  let items = await lookupRes.json();

  let total = 0;
  let payment = "Prepaid";

  items.forEach(i=>{
    total += Number(i.amount || 0);

    if(String(i.payment).toLowerCase() === "cod"){
      payment = "COD";
    }
  });

  // 🔥 3. CALCULATION
  let finalAmount = total;

  if(payment === "Prepaid"){
    finalAmount = total - (total * 0.025 * 1.18);
  }

  // 🔥 SAVE DATA READY
  trackingData = {
    ...trackData,
    amount: finalAmount,
    payment: payment
  };

  // 🔥 UI SHOW
  trackResult.innerHTML = `
    Status: ${trackData.status}<br>
    Customer: ${trackData.customer}<br>
    Payment: ${payment}<br>
    Amount: ₹${finalAmount.toFixed(2)}
  `;

  saveBtn.style.display = "block";
}
</script>

</body>
</html>
