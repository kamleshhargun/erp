<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Tracking System</title>

<style>
  body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 30px;
  }

  .container {
    max-width: 500px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
  }

  button:hover {
    background: darkgreen;
  }

  #result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 5px;
    background: #fafafa;
    border: 1px solid #ddd;
  }

  .error {
    color: red;
    font-weight: bold;
  }

  .success p {
    margin: 5px 0;
  }

  .loading {
    color: blue;
    font-weight: bold;
  }
</style>

</head>

<body>

<div class="container">

  <h2>📦 Order Tracking</h2>

  <input id="orderId" placeholder="Enter Order ID (GS#2001)">
  <input id="waybill" placeholder="Enter Waybill Number">

  <button onclick="track()">Track & Save</button>

  <div id="result"></div>

</div>

<script>

const API_URL = ""; // ⚠️ yaha apna Apps Script URL daalo

async function track() {
  const orderId = document.getElementById("orderId").value.trim();
  const waybill = document.getElementById("waybill").value.trim();
  const resultBox = document.getElementById("result");

  // validation
  if (!orderId || !waybill) {
    resultBox.innerHTML = "<div class='error'>⚠️ Please fill all fields</div>";
    return;
  }

  resultBox.innerHTML = "<div class='loading'>⏳ Tracking & Saving...</div>";

  try {
    const response = await fetch(
      `${API_URL}?orderId=${encodeURIComponent(orderId)}&waybill=${encodeURIComponent(waybill)}`
    );

    if (!response.ok) {
      throw new Error("Server error");
    }

    const data = await response.json();

    if (data.error) {
      resultBox.innerHTML = `<div class='error'>❌ ${data.error}</div>`;
      return;
    }

    // success UI
    resultBox.innerHTML = `
      <div class="success">
        <h3>✅ Order Saved Successfully</h3>
        <p><b>Status:</b> ${data.status}</p>
        <p><b>Location:</b> ${data.location}</p>
        <p><b>Customer:</b> ${data.customer}</p>
        <p><b>State:</b> ${data.state}</p>
        <p><b>Payment:</b> ${data.payment}</p>
        <p><b>Amount:</b> ₹${data.amount}</p>
        <p><b>Updated:</b> ${data.date}</p>
      </div>
    `;

    // clear input after success
    document.getElementById("orderId").value = "";
    document.getElementById("waybill").value = "";

  } catch (error) {
    resultBox.innerHTML = `
      <div class='error'>
        ❌ Failed to fetch data <br>
        👉 Check API URL / Deployment / Internet
      </div>
    `;
    console.error(error);
  }
}

</script>

</body>
</html>
