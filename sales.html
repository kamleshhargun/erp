<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      color: #333;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      font-size: 14px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #result {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    td, th {
      border: 1px solid #ddd;
      padding: 8px;
    }

    th {
      background: #eee;
    }
  </style>
</head>

<body>

<h2>📦 Order Tracking System</h2>

<input type="text" id="orderId" placeholder="Order ID (GS#2001)">
<input type="text" id="waybill" placeholder="Waybill Number">

<button onclick="trackOrder()">Track & Save</button>

<div id="result"></div>

<script>
function trackOrder() {
  const orderId = document.getElementById("orderId").value.trim();
  const waybill = document.getElementById("waybill").value.trim();

  if (!orderId || !waybill) {
    document.getElementById("result").innerHTML = "❌ Order ID aur Waybill daalo";
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Loading...";

  // 🔥 GOOGLE APPS SCRIPT CALL
  google.script.run
    .withSuccessHandler(showResult)
    .withFailureHandler(showError)
    .getTrackingData(orderId, waybill);
}

// ✅ SUCCESS RESULT SHOW
function showResult(data) {

  if (data.error) {
    document.getElementById("result").innerHTML =
      "<pre style='color:red'>" + JSON.stringify(data, null, 2) + "</pre>";
    return;
  }

  let html = `
    <h3>✅ Tracking Result</h3>
    <table>
      <tr><th>Date</th><td>${data.date}</td></tr>
      <tr><th>Order ID</th><td>${data.order_id}</td></tr>
      <tr><th>Waybill</th><td>${data.waybill}</td></tr>
      <tr><th>Status</th><td>${data.status}</td></tr>
      <tr><th>Location</th><td>${data.location}</td></tr>
      <tr><th>Customer</th><td>${data.customer}</td></tr>
      <tr><th>State</th><td>${data.state}</td></tr>
      <tr><th>Amount</th><td>${data.amount}</td></tr>
      <tr><th>Payment</th><td>${data.payment}</td></tr>
    </table>
  `;

  document.getElementById("result").innerHTML = html;
}

// ❌ ERROR HANDLE
function showError(error) {
  document.getElementById("result").innerHTML =
    "<pre style='color:red'>" + error.message + "</pre>";
}
</script>

</body>
</html>
