<!DOCTYPE html>
<html>
<head>
<title>Sales Flow</title>
<style>
body { font-family: Arial; padding: 20px; }
button { margin: 5px; padding: 8px; }
.section { display:none; margin-top:20px; }
.active { background: green; color: white; }
table, th, td { border:1px solid black; border-collapse: collapse; padding:5px; }
</style>
</head>

<body>

<h2>💰 Sales Module</h2>

<!-- Steps -->
<button id="b1" class="active">Pickup</button>
<button id="b2">Customer</button>
<button id="b3">Payment</button>
<button id="b4">Done</button>

<!-- STEP 1 -->
<div id="s1" class="section" style="display:block;">
<input id="orderId" placeholder="Order ID"><br>
<input id="tracking" placeholder="Tracking ID"><br>
<button onclick="step2()">Next</button>
</div>

<!-- STEP 2 -->
<div id="s2" class="section">
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="city" placeholder="City"><br>
<button onclick="saveTracking()">Save & Next</button>
</div>

<!-- STEP 3 -->
<div id="s3" class="section">
<input id="payment" placeholder="Payment Amount"><br>
<button onclick="savePayment()">Pay & Next</button>
</div>

<!-- STEP 4 -->
<div id="s4" class="section">
<h3>✅ Done</h3>
</div>

<hr>

<h3>📊 Orders Table</h3>
<table id="table">
<thead>
<tr>
<th>Order</th><th>Name</th><th>City</th>
<th>Tracking</th><th>Payment</th><th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let url = "https://script.google.com/macros/s/AKfycbyy8zYPJLv00h6p3wI3ery1LlmPl9Ty8zPUZbxVDGRxei6LYww-mtO5to4k5P95E88h9g/exec";

// Step switch
function show(id) {
  document.querySelectorAll(".section").forEach(x=>x.style.display="none");
  document.getElementById(id).style.display="block";
}

// STEP 1 → Fetch
async function step2(){
 let id=document.getElementById("orderId").value;

 let res=await fetch(url+"?orderId="+id);
 let d=await res.json();

 if(d.error){ alert("Not found"); return;}

 document.getElementById("name").value=d.name;
 document.getElementById("phone").value=d.phone;
 document.getElementById("city").value=d.city;

 show("s2");
}

// Save Tracking
async function saveTracking(){
 await fetch(url,{
   method:"POST",
   body:JSON.stringify({
     orderId:document.getElementById("orderId").value,
     tracking:document.getElementById("tracking").value
   })
 });

 show("s3");
 loadTable();
}

// Save Payment
async function savePayment(){
 await fetch(url,{
   method:"POST",
   body:JSON.stringify({
     orderId:document.getElementById("orderId").value,
     payment:document.getElementById("payment").value
   })
 });

 await fetch(url,{
   method:"POST",
   body:JSON.stringify({
     orderId:document.getElementById("orderId").value,
     done:true
   })
 });

 show("s4");
 loadTable();
}

// Load Table
async function loadTable(){
 let res=await fetch(url);
 let data=await res.json();

 let html="";
 data.forEach(r=>{
   html+=`<tr>
   <td>${r.orderId}</td>
   <td>${r.name}</td>
   <td>${r.city}</td>
   <td>${r.tracking||""}</td>
   <td>${r.payment||""}</td>
   <td>${r.status||""}</td>
   </tr>`;
 });

 document.querySelector("#table tbody").innerHTML=html;
}

// Initial load
loadTable();
</script>

</body>
</html>
