<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { padding: 8px; margin: 5px; }
    table { border-collapse: collapse; margin-top: 20px; }
    td, th { border: 1px solid #ccc; padding: 8px; }
  </style>
</head>
<body>

<h2>📦 Order Tracking System</h2>

<input type="text" id="orderId" placeholder="Order ID (GS#2001)">
<input type="text" id="waybill" placeholder="Waybill">
<button onclick="track()">Track & Save</button>

<div id="result"></div>

<script>
function track() {
  const orderId = document.getElementById("orderId").value;
  const waybill = document.getElementById("waybill").value;

  document.getElementById("result").innerHTML = "Loading...";

  google.script.run.withSuccessHandler(showResult)
    .getTrackingData(orderId, waybill);
}

function showResult(data) {
  if (data.error) {
    document.getElementById("result").innerHTML = "❌ " + data.error;
    return;
  }

  let html = `
    <h3>Result</h3>
    <table>
      <tr><th>Date</th><td>${data.date}</td></tr>
      <tr><th>Order ID</th><td>${data.order_id}</td></tr>
      <tr><th>Waybill</th><td>${data.waybill}</td></tr>
      <tr><th>Status</th><td>${data.status}</td></tr>
      <tr><th>Location</th><td>${data.location}</td></tr>
      <tr><th>Customer</th><td>${data.customer}</td></tr>
      <tr><th>State</th><td>${data.state}</td></tr>
      <tr><th>Amount</th><td>${data.amount}</td></tr>
      <tr><th>Payment</th><td>${data.payment}</td></tr>
    </table>
  `;

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
