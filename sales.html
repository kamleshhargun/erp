<!DOCTYPE html>
<html>
<head>
  <title>Order Tracking System</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { padding: 10px; margin: 5px; }
    button { background: green; color: white; border: none; cursor: pointer; }
    #result { margin-top: 20px; padding: 10px; border: 1px solid #ddd; }
  </style>
</head>

<body>

<h2>📦 Order Tracking System</h2>

<input id="orderId" placeholder="Order ID (GS#2001)">
<input id="waybill" placeholder="Waybill">

<button onclick="track()">Track Order</button>

<div id="result"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbypCUwgHZ_02c-9j_GJ8Kw7T1_HD66b6IwXON4OwZcWzhYZe6C2vyqeLNCjpz3fUFM0Ng/exec";

function track() {
  let orderId = document.getElementById("orderId").value;
  let waybill = document.getElementById("waybill").value;

  document.getElementById("result").innerHTML = "Loading...";

  fetch(`${API_URL}?orderId=${encodeURIComponent(orderId)}&waybill=${waybill}`)
    .then(res => res.json())
    .then(data => {

      if (data.error) {
        document.getElementById("result").innerHTML =
          "<b style='color:red'>" + data.error + "</b>";
        return;
      }

      document.getElementById("result").innerHTML = `
        <h3>Result</h3>
        <p><b>Status:</b> ${data.status}</p>
        <p><b>Location:</b> ${data.location}</p>
        <p><b>Customer:</b> ${data.customer}</p>
        <p><b>State:</b> ${data.state}</p>
        <p><b>Payment:</b> ${data.payment}</p>
        <p><b>Amount:</b> ${data.amount}</p>
        <p><b>Date:</b> ${data.date}</p>
      `;
    })
    .catch(err => {
      document.getElementById("result").innerHTML = err;
    });
}

</script>

</body>
</html>
